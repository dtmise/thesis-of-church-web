services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./docker.server.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./createScheme.sql:/docker-entrypoint-initdb.d/01-createScheme.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./docker.server.env
    environment:
      API_DB_HOST: db
      API_USE_HTTPS: "false"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "1904"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./docker.server.env
    environment:
      API_HOST: api
      API_USE_HTTPS: "false"
      WEB_USE_HTTPS: "false"
    depends_on:
      - api
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - ./docker.server.env
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config: