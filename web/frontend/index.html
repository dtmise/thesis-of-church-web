<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church-Turing Thesis - Регистрация команды</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Church-Turing Thesis</h1>
                <p>Зарегистрируйте свою команду для участия в конкурсе</p>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="register">
                    <span>Регистрация команды</span>
                </button>
                <button class="tab-btn" data-tab="login">
                 
                    <span>Вход</span>
                </button>
            </div>
            
            <!-- Форма регистрации команды -->
            <form id="register-form" class="auth-form active">
                <div class="form-section">
                    <h2>
                        Информация о команде
                    </h2>
                    
                    <div class="form-group">
                        <label for="team-name">
                            <span class="label-icon">📛</span>
                            Название команды
                        </label>
                        <input type="text" id="team-name" placeholder="Например: Code Warriors" required>
                        <div class="input-hint">Уникальное название от 3 до 50 символов</div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h2>
                
                        Участники команды
                    </h2>
                    
                    <div id="members-container">
                        <!-- Капитан (обязательный) -->
                        <div class="member-card" data-member-index="0">
                            <div class="member-header">
                                <div class="member-badge captain">
                                    <span class="badge-icon">👑</span>
                                    Капитан
                                </div>
                                <button type="button" class="remove-member-btn" disabled style="opacity:0.5; cursor: not-allowed;">✕</button>
                            </div>
                            <div class="member-fields">
                                <div class="form-group">
                                    <label>ФИО</label>
                                    <input type="text" class="member-fullname" placeholder="Иванов Иван Иванович" required>
                                </div>
                                <div class="form-group">
                                    <label>Группа</label>
                                    <input type="text" class="member-group" placeholder="ИУ5-51Б" required>
                                </div>
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" class="member-email" placeholder="example@mail.com" required>
                                </div>
                                <div class="form-group">
                                    <label>Пароль</label>
                                    <input type="password" class="member-password" placeholder="минимум 6 символов" required minlength="6">
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <button type="button" id="add-member-btn" class="btn-add-member">
                        <span>+</span> Добавить участника
                    </button>
                    <div id="member-limit-hint" class="limit-hint"></div>
                </div>
                
                <button type="submit" class="btn-submit">
                    
                    Зарегистрировать команду
                    
                </button>
                <div id="register-error" class="error-message"></div>
            </form>
            
            <!-- Форма входа -->
            <form id="login-form" class="auth-form">
                <div class="form-section">
                    <h2>
                        Вход в аккаунт
                    </h2>
                    
                    <div class="form-group">
                        <label for="login-email">
                            <span class="label-icon">📧</span>
                            Email
                        </label>
                        <input type="email" id="login-email" placeholder="example@mail.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">
                            <span class="label-icon">🔒</span>
                            Пароль
                        </label>
                        <input type="password" id="login-password" placeholder="••••••" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit">
                    <span>🔑</span>
                    Войти
                    <span>➡️</span>
                </button>
                <div id="login-error" class="error-message"></div>
            </form>
        </div>
    </div>
    
    <script type="module" src="js/index.js"></script>
</body>
</html>
