services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./docker.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./createScheme.sql:/docker-entrypoint-initdb.d/01-createScheme.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./docker.env
    environment:
      API_DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "1904:1904"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./docker.env
    environment:
      API_HOST: api
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./certs:/certs:ro

  redirect:
    build:
      context: ./redirect
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./docker.env
    ports:
      - "8080:8080"

volumes:
  postgres_data: